<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop All | The Little Capsule Co</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <nav class="top-nav">
            <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">The Little Capsule Co</a></div>
            <div class="nav-icons"><span id="cart-count">🛒</span></div>
        </nav>
    </header>

    <main class="catalog-container">
        <!-- Search & Filter Bar (Heuristic #6) -->
        <section class="search-filter-section">
            <input type="text" id="catalog-search" placeholder="Search for 'Beanie' or 'Cashmere'...">
            <div class="filter-pills">
                <button class="pill active">All</button>
                <button class="pill">Size 000</button>
                <button class="pill">Size 00</button>
                <button class="pill">New</button>
            </div>
        </section>

        <!-- Dynamic Product Grid -->
        <section class="product-grid" id="main-catalog-grid">
            <!-- Product 1 -->
            <a href="product.html" class="product-card">
                <img src="beanie.webp" alt="Cashmere Beanie">
                <h3>Cashmere Beanie</h3>
                <p class="price">$32.00</p>
                <span class="tag">Size 00</span>
            </a>
            <!-- Product 2 -->
            <div class="product-card">
                <img src="jumper.webp" alt="Cashmere Jumper">
                <h3>Cashmere Jumper</h3>
                <p class="price">$45.00</p>
                <span class="tag">Size 0</span>
            </div>
            <!-- Product 3 -->
            <div class="product-card">
                <img src="leggings.webp" alt="Cashmere Leggings">
                <h3>Cashmere Leggings</h3>
                <p class="price">$38.00</p>
                <span class="tag">Size 000</span>
            </div>
            <!-- Product 4 -->
             <div class="product-card">
                <img src="boots.webp" alt="Cashmere Boots">
                <h3>Cashmere Boots</h3>
                <p class="price">$18.00</p>
                <span class="tag">Size 000</span>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">Home</a>
        <a href="catalog.html" class="nav-item active">Search</a>
        <a href="cart.html" class="nav-item">Cart</a>
        <a href="#" class="nav-item">Profile</a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
