<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Little Capsule Co | Sustainable Boutique</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="top-nav">
            <div class="logo">The Little Capsule Co</div>
            <div class="nav-icons">
                <span id="search-trigger">🔍</span>
                <span id="cart-count">🛒 (0)</span>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>Sustainable Style for Little Ones</h1>
                <p>Curated pre-loved designer labels for the eco-conscious parent.</p>
                <button class="btn-primary">Shop New Arrivals</button>
            </div>
            <div class="hero-image">
                <div class="image-box"></div> 
            </div>
        </section>

        <section class="categories">
            <h2>Shop by Category</h2>
            <div class="grid-container">
                <div class="category-card"><h3>Baby</h3></div>
                <div class="category-card"><h3>Toddler</h3></div>
                <div class="category-card"><h3>Accessories</h3></div>
                <div class="category-card"><h3>Pre-Loved</h3></div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active">Home</a>
        <a href="#" class="nav-item">Search</a>
        <a href="#" class="nav-item">Cart</a>
        <a href="#" class="nav-item">Profile</a>
    </nav>

    <script src="script.js"></script>
</body>
</html>
