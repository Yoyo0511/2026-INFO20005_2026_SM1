<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashmere Beanie | The Little Capsule Co</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700&family=Playfair+Display:wght@700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <nav class="top-nav">
            <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">The Little Capsule
                    Co</a></div>
            <div class="nav-icons">
                <a href="catalog.html" style="text-decoration:none;">🔍</a>
                <a href="cart.html" style="text-decoration:none;"><span id="cart-count">🛒</span></a>
            </div>
        </nav>
    </header>

    <main class="pdp-container">
        <section class="product-visuals">
            <div class="carousel-container">
                <div class="carousel-track">
                    <img src="beanie-alt1.jpg" alt="Cashmere Beanie on Baby" class="carousel-slide">
                    <img src="beanie-alt2.webp" alt="Cashmere Beanie Close-up" class="carousel-slide">
                    <img src="set.webp" alt="Cashmere Beanie Flat Lay" class="carousel-slide">
                </div>

                <button class="carousel-btn prev-btn" id="prev-slide">&#10094;</button>
                <button class="carousel-btn next-btn" id="next-slide">&#10095;</button>

                <div class="carousel-dots">
                    <span class="dot active"></span>
                    <span class="dot"></span>
                    <span class="dot"></span>
                </div>
            </div>
        </section>

        <section class="product-info">
            <h1>Cashmere Beanie</h1>
            <p class="pdp-price">$32.00</p>
            <div class="condition-tag">Condition: Excellent</div>

            <div class="description-box">
                <h3>Description</h3>
                <p>This ultra-soft 100% cashmere beanie is perfect for keeping your little one warm. Hand-inspected for
                    quality.</p>
            </div>

            <div class="size-selector">
                <h3>Select Size</h3>
                <div class="size-options">
                    <button class="size-btn">000</button>
                    <button class="size-btn active">00</button>
                    <button class="size-btn">0</button>
                </div>
            </div>
        </section>
    </main>

    <!-- STICKY CTA BAR (Core Fix for MoF 4) -->
    <div class="sticky-cta">
        <div class="cta-inner">
            <div class="qty-selector">
                <button id="minus">-</button>
                <span id="qty">1</span>
                <button id="plus">+</button>
            </div>
            <button id="add-to-cart-btn" class="btn-primary">Add to Bag</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
